  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ransition:color .2s\" style-hover=\"color:#4f7eff\"><span style=\"width:30px;font-size:9px;color:#3a4454;letter-spacing:.1em\">WEB<\u002Fspan><span style=\"flex:1\">Live Project — Perceive AI<\u002Fspan><span>→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"border-top:1px solid rgba(255,255,255,.06);padding:2rem 0;background:#0a0e14;position:relative;z-index:1\">\n  <div style=\"max-width:1320px;margin:0 auto;padding:0 5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap\">\n    <div style=\"font-family:'DM Mono',monospace;font-size:9px;color:#3a4454;letter-spacing:.1em\">© 2025 Aastha Verma · AI Engineer · New Delhi, India<\u002Fdiv>\n    <div style=\"font-family:'DM Mono',monospace;font-size:9px;color:#3a4454;letter-spacing:.1em\">Open to full-time opportunities · Remote friendly<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    this._rafs = {};\n    this._cleanup = [];\n    this.initReveal();\n    this.initCounters();\n    const fine = window.matchMedia('(hover:hover) and (pointer:fine)').matches;\n    if(fine){ this.initCursor(); this.initMagnetic(); }\n    this.initHero();\n    this.initSkills();\n  }\n  componentWillUnmount(){\n    Object.values(this._rafs||{}).forEach(id=>cancelAnimationFrame(id));\n    (this._cleanup||[]).forEach(fn=>{ try{fn();}catch(e){} });\n  }\n  root_(){ return this.root || document; }\n\n  initReveal(){\n    const els = [...this.root_().querySelectorAll('[data-reveal]')];\n    // snap = instant visible (no transition → no dependency on the rendering loop)\n    const snap = (el)=>{ el.style.transition='none'; el.style.opacity='1'; el.style.transform='none'; };\n    // fade = animate in via the inline transition (used on scroll, when frames are running)\n    const fade = (el)=>{ const d=parseInt(el.dataset.delay||'0'); setTimeout(()=>{ el.style.opacity='1'; el.style.transform='none'; }, d); };\n    if(!('IntersectionObserver' in window)){ els.forEach(snap); return; }\n    const io = new IntersectionObserver((ents)=>{\n      ents.forEach(e=>{ if(e.isIntersecting){ fade(e.target); io.unobserve(e.target); } });\n    }, {threshold:0.12, rootMargin:'0px 0px -40px 0px'});\n    const vh = window.innerHeight || document.documentElement.clientHeight || 800;\n    els.forEach(el=>{\n      // Above-the-fold content snaps in instantly on mount — never waits on a timer, observer, or transition\n      if(el.getBoundingClientRect().top < vh*0.98){ snap(el); }\n      else { io.observe(el); }\n    });\n    // Safety net: if the observer never fires (throttled / hidden render contexts), reveal everything\n    this._revealFallback = setTimeout(()=>els.forEach(snap), 1200);\n    this._cleanup.push(()=>{ io.disconnect(); clearTimeout(this._revealFallback); });\n  }\n\n  initCounters(){\n    const els = [...this.root_().querySelectorAll('[data-count]')];\n    const io = new IntersectionObserver((ents)=>{\n      ents.forEach(e=>{ if(e.isIntersecting){ this.animateCount(e.target); io.unobserve(e.target); } });\n    }, {threshold:0.5});\n    const vh = window.innerHeight || document.documentElement.clientHeight || 800;\n    els.forEach(el=>{\n      // Above-the-fold counters snap to their final value (never depend on rAF); off-screen ones count up on scroll\n      if(el.getBoundingClientRect().top < vh*0.98){ this.setFinal(el); }\n      else { io.observe(el); }\n    });\n    this._cleanup.push(()=>io.disconnect());\n  }\n  setFinal(el){\n    const target = parseFloat(el.dataset.count);\n    const dec = parseInt(el.dataset.decimals||'0');\n    if(el.firstChild) el.firstChild.nodeValue = target.toFixed(dec);\n  }\n  animateCount(el){\n    const target = parseFloat(el.dataset.count);\n    const dec = parseInt(el.dataset.decimals||'0');\n    const dur = 1300, t0 = performance.now();\n    const tn = el.firstChild;\n    const setVal = (v)=>{ if(tn) tn.nodeValue = v.toFixed(dec); };\n    const step = (t)=>{\n      const p = Math.min((t-t0)/dur, 1);\n      const eased = 1 - Math.pow(1-p, 3);\n      setVal(target*eased);\n      if(p<1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n    // Fallback: guarantee the final number shows even if rAF is paused\n    setTimeout(()=>setVal(target), dur+250);\n  }\n\n  initCursor(){\n    const dot = this.cursorEl, ring = this.ringEl;\n    if(!dot || !ring) return;\n    let mx=0,my=0,rx=0,ry=0;\n    const move = (e)=>{ mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; };\n    window.addEventListener('mousemove', move);\n    this._cleanup.push(()=>window.removeEventListener('mousemove', move));\n    const loop = ()=>{ rx+=(mx-rx)*0.14; ry+=(my-ry)*0.14; ring.style.left=rx+'px'; ring.style.top=ry+'px'; this._rafs.cursor=requestAnimationFrame(loop); };\n    loop();\n    this.root_().querySelectorAll('a,button,[data-cursor]').forEach(el=>{\n      const en = ()=>{ dot.style.transform='translate(-50%,-50%) scale(2.4)'; ring.style.width='54px'; ring.style.height='54px'; ring.style.opacity='0.25'; };\n      const le = ()=>{ dot.style.transform='translate(-50%,-50%) scale(1)'; ring.style.width='34px'; ring.style.height='34px'; ring.style.opacity='0.5'; };\n      el.addEventListener('mouseenter', en); el.addEventListener('mouseleave', le);\n    });\n  }\n\n  initMagnetic(){\n    this.root_().querySelectorAll('[data-magnetic]').forEach(el=>{\n      const s = parseFloat(el.dataset.magnetic)||0.3;\n      const mm = (e)=>{ const r=el.getBoundingClientRect(); const x=e.clientX-(r.left+r.width/2); const y=e.clientY-(r.top+r.height/2); el.style.transform='translate('+(x*s)+'px,'+(y*s)+'px)'; };\n      const ml = ()=>{ el.style.transform='translate(0,0)'; };\n      el.style.transition = 'transform .25s cubic-bezier(.2,.8,.2,1)';\n      el.addEventListener('mousemove', mm); el.addEventListener('mouseleave', ml);\n    });\n  }\n\n  initHero(){\n    const c = this.heroCanvas; if(!c) return;\n    const ctx = c.getContext('2d');\n    const dpr = Math.min(window.devicePixelRatio||1, 2);\n    let w=0,h=0,pts=[];\n    const mouse = {x:-999,y:-999};\n    const make = ()=>{ const n = w<700?32:Math.round(w*h/16000); pts=[]; for(let i=0;i<n;i++) pts.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,r:Math.random()*1.6+.6}); };\n    const resize = ()=>{ const rect=c.getBoundingClientRect(); w=rect.width; h=rect.height; if(!w||!h)return; c.width=w*dpr; c.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); make(); };\n    resize();\n    window.addEventListener('resize', resize);\n    this._cleanup.push(()=>window.removeEventListener('resize', resize));\n    const onMove = (e)=>{ const rect=c.getBoundingClientRect(); mouse.x=e.clientX-rect.left; mouse.y=e.clientY-rect.top; };\n    window.addEventListener('mousemove', onMove);\n    this._cleanup.push(()=>window.removeEventListener('mousemove', onMove));\n    const loop = ()=>{\n      if(w&&h){\n        ctx.clearRect(0,0,w,h);\n        for(const p of pts){ p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>w)p.vx*=-1; if(p.y<0||p.y>h)p.vy*=-1; const dx=mouse.x-p.x,dy=mouse.y-p.y,d=Math.hypot(dx,dy); if(d<150&&d>0){ p.x+=dx/d*0.35; p.y+=dy/d*0.35; } }\n        for(let i=0;i<pts.length;i++){ for(let j=i+1;j<pts.length;j++){ const a=pts[i],b=pts[j]; const d=Math.hypot(a.x-b.x,a.y-b.y); if(d<128){ ctx.strokeStyle='rgba(79,126,255,'+(0.13*(1-d/128))+')'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); } } }\n        for(const p of pts){ const d=Math.hypot(mouse.x-p.x,mouse.y-p.y); if(d<175){ ctx.strokeStyle='rgba(107,146,255,'+(0.22*(1-d/175))+')'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(mouse.x,mouse.y); ctx.lineTo(p.x,p.y); ctx.stroke(); } }\n        ctx.fillStyle='rgba(150,180,255,.5)';\n        for(const p of pts){ ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.2832); ctx.fill(); }\n      }\n      this._rafs.hero=requestAnimationFrame(loop);\n    };\n    loop();\n  }\n\n  initSkills(){\n    const c = this.skillsCanvas; if(!c) return;\n    const ctx = c.getContext('2d');\n    const dpr = Math.min(window.devicePixelRatio||1, 2);\n    let w=0,h=0;\n    const mouse = {x:-999,y:-999};\n    const cols = ['79,126,255','107,146,255','138,169,255','168,230,163'];\n    const data = [\n      ['LLMs',0],['RAG',0],['LangChain',0],['LangGraph',0],['HuggingFace',0],['BERT',0],['XGBoost',0],['SHAP',0],['CNN',0],\n      ['PyTorch',1],['TensorFlow',1],['FastAPI',1],['React',1],['OpenCV',1],\n      ['Python',2],['JavaScript',2],['SQL',2],['Git',2],\n      ['Docker',3],['Vercel',3],['Vector DBs',3]\n    ];\n    let nodes=[];\n    const make = ()=>{ nodes = data.map(d=>({ label:d[0], cat:d[1], x:40+Math.random()*(w-80), y:40+Math.random()*(h-80), vx:(Math.random()-.5)*0.22, vy:(Math.random()-.5)*0.22, r: d[1]===0?6:5 })); };\n    const resize = ()=>{ const rect=c.getBoundingClientRect(); w=rect.width; h=rect.height; if(!w||!h)return; c.width=w*dpr; c.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); if(!nodes.length) make(); else nodes.forEach(n=>{ n.x=Math.min(Math.max(n.x,40),w-40); n.y=Math.min(Math.max(n.y,40),h-40); }); };\n    resize();\n    window.addEventListener('resize', resize);\n    this._cleanup.push(()=>window.removeEventListener('resize', resize));\n    const onMove = (e)=>{ const rect=c.getBoundingClientRect(); mouse.x=e.clientX-rect.left; mouse.y=e.clientY-rect.top; };\n    const onLeave = ()=>{ mouse.x=-999; mouse.y=-999; };\n    c.addEventListener('mousemove', onMove);\n    c.addEventListener('mouseleave', onLeave);\n    this._cleanup.push(()=>{ c.removeEventListener('mousemove', onMove); c.removeEventListener('mouseleave', onLeave); });\n    const loop = ()=>{\n      if(w&&h){\n        ctx.clearRect(0,0,w,h);\n        for(const n of nodes){ n.x+=n.vx; n.y+=n.vy; if(n.x<34||n.x>w-34)n.vx*=-1; if(n.y<46||n.y>h-24)n.vy*=-1; }\n        for(let i=0;i<nodes.length;i++){ for(let j=i+1;j<nodes.length;j++){ const a=nodes[i],b=nodes[j]; const d=Math.hypot(a.x-b.x,a.y-b.y); const same=a.cat===b.cat; const lim=same?170:120; if(d<lim){ ctx.strokeStyle='rgba('+cols[a.cat]+','+((same?0.2:0.05)*(1-d/lim))+')'; ctx.lineWidth=same?1.1:0.7; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); } } }\n        ctx.font = '10px \"DM Mono\", monospace';\n        ctx.textAlign = 'center';\n        for(const n of nodes){\n          const dm = Math.hypot(mouse.x-n.x, mouse.y-n.y);\n          const hot = dm < 46;\n          const col = cols[n.cat];\n          const r = n.r*(hot?1.7:1);\n          ctx.beginPath(); ctx.arc(n.x,n.y,r+6,0,6.2832); ctx.fillStyle='rgba('+col+','+(hot?0.22:0.08)+')'; ctx.fill();\n          ctx.beginPath(); ctx.arc(n.x,n.y,r,0,6.2832); ctx.fillStyle='rgba('+col+','+(hot?1:0.6)+')'; ctx.fill();\n          ctx.fillStyle = hot ? 'rgba(232,237,245,0.98)' : 'rgba(196,205,216,0.45)';\n          ctx.fillText(n.label, n.x, n.y - r - 7);\n        }\n      }\n      this._rafs.skills=requestAnimationFrame(loop);\n    };\n    loop();\n  }\n\n  renderVals(){\n    return {\n      setRoot: (el)=>{ this.root = el; },\n      setCursor: (el)=>{ this.cursorEl = el; },\n      setRing: (el)=>{ this.ringEl = el; },\n      setHeroCanvas: (el)=>{ this.heroCanvas = el; },\n      setSkillsCanvas: (el)=>{ this.skillsCanvas = el; },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
